<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tow Companies Croatia</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
      }

      body {
        background: #f3f5f7;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      header {
        background: #1f2937;
        color: white;
        padding: 25px;
        text-align: center;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 1px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }

      main {
        flex: 1;
        padding: 30px;
      }

      .container {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
      }

      .search-box {
        width: 100%;
        max-width: 450px;
        padding: 12px 16px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
      }

      .table-container {
        overflow: auto;
        max-height: 70vh;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout:auto;
      }
      

      thead th {
        position: sticky;
        top: 0;
        background: #2563eb;
        color: white;
        cursor: pointer;
        user-select: none;
        padding: 14px;
      }

      tbody td {
        padding: 12px;
        border-bottom: 1px solid #e5e5e5;
      }

      tbody tr:nth-child(even) {
        background: #f8f9fa;
      }

      tbody tr:hover {
        background: #eaf2ff;
      }

      th:hover {
        background: #1d4ed8;
      }

      footer {
        background: #1f2937;
        color: white;
        text-align: center;
        padding: 18px;
        margin-top: 20px;
      }

      @media (max-width: 768px) {
        main {
          padding: 10px;
        }

        .container {
          padding: 10px;
        }

        .search-box {
          font-size: 14px;
          padding: 10px;
        }

        table {
          font-size: 12px;
        }

        th,
        td {
          padding: 6px 4px;
          white-space: nowrap;
        }

        th {
          font-size: 11px;
        }

        .table-container {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
      }
    </style>
  </head>
  <body>
    <header>Tow Companies Directory (Vučne službe HR)</header>

    <main>
      <div class="container">
        <input
          type="text"
          id="searchInput"
          class="search-box"
          placeholder="Search city, registration, company or phone..."
        />

        <div class="table-container">
          <table id="towTable">
            <thead>
              <tr>
                <th>City</th>
                <th>County Code</th>
                <th>Tow Company</th>
                <th>Phone</th>
              </tr>
            </thead>

            <tbody id="tableBody">
              <!-- JavaScript inserts rows here -->
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <footer>©2026</footer>

    <script>
      let tableData = [];

      fetch("tow_companies.csv")
        .then((response) => response.text())
        .then((csv) => {
          const rows = csv.trim().split("\n");

          

          // Remove header row
          rows.shift();

          const tbody = document.getElementById("tableBody");

          rows.forEach((row) => {

            if (row.trim() === "") return;
            const cols = row.split(";");

            console.log(cols);

            tableData.push(cols);

            const tr = document.createElement("tr");

            cols.forEach((col) => {
              const td = document.createElement("td");
              td.textContent = col;
              tr.appendChild(td);
            });

            tbody.appendChild(tr);
          });
        });

      const searchInput = document.getElementById("searchInput");

      searchInput.addEventListener("keyup", function () {
        const filter = this.value.toLowerCase();

        const rows = document.querySelectorAll("#towTable tbody tr");

        rows.forEach((row) => {
          const text = row.textContent.toLowerCase();

          row.style.display = text.includes(filter) ? "" : "none";
        });
      });

      // }
    </script>
  </body>
</html>
